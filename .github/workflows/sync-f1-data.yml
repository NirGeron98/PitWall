name: Sync F1 Data

on:
  schedule:
    # Every 30 min during likely session hours Friday–Sunday UTC
    # Covers FP1/FP2/FP3 (typically 10:30, 14:00), Qualifying (14:00–16:00),
    # Sprint (12:00) and Race (13:00–16:00). 30 min matches FastF1's own
    # publish lag so running faster than this gains nothing.
    - cron: '0,30 9-17 * * 5'    # Every 30 min 09:00–17:30 Friday
    - cron: '0,30 9-17 * * 6'    # Every 30 min 09:00–17:30 Saturday
    - cron: '0,30 11-17 * * 0'   # Every 30 min 11:00–17:30 Sunday (race day)
    # Monday 08:00 UTC — final pickup of race results + updated standings
    - cron: '0 8 * * 1'
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: BACKEND_URL secret is empty or not set"
            exit 1
          fi
          echo "BACKEND_URL is set: ${BACKEND_URL}"

      - name: Sync current year
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_SYNC_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
        run: |
          YEAR=$(date +%Y)
          echo "Syncing F1 data for $YEAR..."
          curl -v -X POST \
            "${BACKEND_URL}/api/admin/sync?year=${YEAR}" \
            -H "x-admin-sync-secret: ${ADMIN_SYNC_SECRET}" \
            --max-time 600
          echo "Sync complete"
