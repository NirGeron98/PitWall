name: Sync F1 Data

on:
  schedule:
    # Every hour Friday–Sunday (race weekends) UTC
    # Friday 10:00–Sunday 23:00 UTC covers most sessions globally
    - cron: '0 * * * 5'   # Every hour on Friday
    - cron: '0 * * * 6'   # Every hour on Saturday
    - cron: '0 * * * 0'   # Every hour on Sunday
    # Every Monday at 08:00 UTC — pick up race results + standings
    - cron: '0 8 * * 1'
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync current year
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_SYNC_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
        run: |
          YEAR=$(date +%Y)
          echo "Syncing F1 data for $YEAR..."
          curl -s -X POST \
            "${BACKEND_URL}/api/admin/sync?year=${YEAR}" \
            -H "x-admin-sync-secret: ${ADMIN_SYNC_SECRET}" \
            --max-time 600
          echo "Sync complete"
